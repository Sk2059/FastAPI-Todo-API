name : FastAPI CI

on:
  push:
    branch:
      -main

jobs:
  test:

    runs-on: ubuntu-leatest

    steps :
       
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest